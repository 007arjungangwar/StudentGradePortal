<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Student Grade Portal | Dynamic Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Login Card */
        .login-card, .dashboard-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .content {
            padding: 40px;
        }

        /* Login Form */
        .login-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .message.success {
            display: block;
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            display: block;
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .welcome-text h2 {
            color: #333;
            margin-bottom: 5px;
        }

        .welcome-text p {
            color: #666;
            font-size: 0.9rem;
        }

        .logout-btn {
            width: auto;
            padding: 10px 25px;
            background: #dc3545;
        }

        .logout-btn:hover {
            background: #c82333;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.4);
        }

        /* Dynamic Cards Grid */
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .record-card {
            background: white;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .record-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .record-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            display: block;
        }

        .record-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            word-wrap: break-word;
        }

        .record-value.pending {
            color: #ff9800;
            font-style: italic;
            font-size: 1rem;
        }

        /* Special styling for marks */
        .record-card.marks-card {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-color: #667eea;
        }

        .record-card.marks-card .record-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #667eea;
        }

        /* Footer */
        .footer {
            margin-top: 30px;
            padding: 20px;
            text-align: center;
            color: #666;
            border-top: 1px solid #f0f0f0;
            font-size: 0.85rem;
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .records-grid {
                grid-template-columns: 1fr;
            }
            
            .dashboard-header {
                flex-direction: column;
                text-align: center;
            }
            
            .logout-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Section -->
        <div id="loginSection" class="login-card">
            <div class="header">
                <h1>📚 Student Grade Portal</h1>
                <p>Secure access to your academic records</p>
            </div>
            <div class="content">
                <div class="login-form">
                    <div class="form-group">
                        <label for="prn">PRN Number</label>
                        <input type="text" id="prn" placeholder="Enter your PRN" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password">
                    </div>
                    <button onclick="login()" id="loginBtn">Login →</button>
                    <div id="message" class="message"></div>
                </div>
            </div>
            <div class="footer">
                ⚡ Live data from Google Sheets • Updates reflect instantly
            </div>
        </div>

        <!-- Dashboard Section (Hidden Initially) -->
        <div id="dashboardSection" class="dashboard-card" style="display: none;">
            <div class="header">
                <h1>🎓 Student Dashboard</h1>
                <p>Your complete academic profile</p>
            </div>
            <div class="content">
                <div class="dashboard-header">
                    <div class="welcome-text">
                        <h2 id="studentName">Welcome, Student!</h2>
                        <p id="studentInfo">Loading your information...</p>
                    </div>
                    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
                </div>
                <div id="recordsContainer">
                    <div class="records-grid" id="dynamicGrid"></div>
                </div>
            </div>
            <div class="footer">
                🔄 Data is fetched live • Any changes in Google Sheet appear immediately
            </div>
        </div>
    </div>

    <script>
        // IMPORTANT: Replace this with your Apps Script Web App URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzeaIa45hqX0p-5BbU6sHDsccG-tzSbmSjZs74vfKEUfE1etYl6Ud7-36lerHJ056GR/exec';
        
        // Check if user is already logged in
        window.onload = function() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const studentData = sessionStorage.getItem('studentData');
            
            if (isLoggedIn === 'true' && studentData) {
                try {
                    const data = JSON.parse(studentData);
                    showDashboard(data);
                } catch(e) {
                    logout();
                }
            }
        };
        
        async function login() {
            const prn = document.getElementById('prn').value.trim();
            const password = document.getElementById('password').value;
            
            if (!prn || !password) {
                showMessage('Please enter both PRN and password', 'error');
                return;
            }
            
            // Show loading
            const loginBtn = document.getElementById('loginBtn');
            const originalText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<span class="loading"></span> Verifying...';
            loginBtn.disabled = true;
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prn: prn, password: password })
                });
                
                const result = await response.json();
                
                if (result.success && result.data) {
                    // Store student data
                    sessionStorage.setItem('studentData', JSON.stringify(result.data));
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('prn', prn);
                    
                    showDashboard(result.data);
                    showMessage('Login successful!', 'success');
                } else {
                    showMessage(result.message || 'Login failed. Please check your credentials.', 'error');
                }
            } catch(error) {
                console.error('Login error:', error);
                showMessage('Network error. Please check if the Apps Script is deployed correctly.', 'error');
            } finally {
                loginBtn.innerHTML = originalText;
                loginBtn.disabled = false;
            }
        }
        
        function showDashboard(studentData) {
            // Hide login, show dashboard
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            
            // Get student info
            const values = studentData.values;
            const headers = studentData.headers;
            
            // Find name (try different common variations)
            let studentName = values['name'] || values['Name'] || values['student name'] || 'Student';
            let studentPRN = values['prn'] || values['PRN'] || 'N/A';
            let studentEmail = values['email'] || values['Email'] || values['email id'] || 'Not provided';
            
            // Update welcome section
            document.getElementById('studentName').innerHTML = `Welcome, ${escapeHtml(studentName)}!`;
            document.getElementById('studentInfo').innerHTML = `📇 PRN: ${escapeHtml(studentPRN)} | 📧 ${escapeHtml(studentEmail)}`;
            
            // Dynamically generate all records
            const grid = document.getElementById('dynamicGrid');
            grid.innerHTML = '';
            
            // Separate marks columns for special styling
            const marksKeywords = ['marks', 'score', 'grade', 'assignment', 'midsem', 'endsem', 'exam', 'total', 'percentage'];
            
            for (let i = 0; i < headers.length; i++) {
                const header = headers[i];
                let value = values[header];
                
                // Skip PRN as it's already shown
                if (header.toLowerCase() === 'prn') continue;
                
                // Check if it's a marks-related column
                const isMarksColumn = marksKeywords.some(keyword => 
                    header.toLowerCase().includes(keyword)
                );
                
                // Create card
                const card = document.createElement('div');
                card.className = `record-card ${isMarksColumn ? 'marks-card' : ''}`;
                card.style.animationDelay = `${i * 0.05}s`;
                
                const isPending = value === '⚠️ Pending';
                
                card.innerHTML = `
                    <span class="record-label">${escapeHtml(header)}</span>
                    <div class="record-value ${isPending ? 'pending' : ''}">
                        ${isPending ? '📝 ' + value : escapeHtml(value)}
                    </div>
                `;
                
                grid.appendChild(card);
            }
        }
        
        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('studentData');
            sessionStorage.removeItem('prn');
            
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('prn').value = '';
            document.getElementById('password').value = '';
            showMessage('You have been logged out.', 'success');
        }
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            
            setTimeout(() => {
                if (messageDiv.className.includes(type)) {
                    messageDiv.style.display = 'none';
                    messageDiv.className = 'message';
                }
            }, 5000);
        }
        
        function escapeHtml(str) {
            if (!str) return '—';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
